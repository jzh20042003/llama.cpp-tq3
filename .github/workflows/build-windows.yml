name: Build Windows CUDA Complete
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '12.4.1'

      - name: Configure and Build
        continue-on-error: true
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DGGML_CUDA=ON -DGGML_CUDA_FA=ON -DLLAMA_CURL=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j 4

      - name: Bundle CUDA DLLs (打包 NVIDIA 运行库)
        continue-on-error: true
        run: |
          # 将云服务器上的 CUDA 核心 DLL 强行拷贝到我们的 exe 目录下
          Copy-Item "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin\cudart64_*.dll" -Destination "build\bin\Release\"
          Copy-Item "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin\cublas64_*.dll" -Destination "build\bin\Release\"
          Copy-Item "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin\cublasLt64_*.dll" -Destination "build\bin\Release\"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-tq3-windows-cuda-COMPLETE
          path: build/bin/Release/
