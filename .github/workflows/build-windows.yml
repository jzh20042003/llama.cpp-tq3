name: Build Windows CUDA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '12.4.1'

      - name: Configure and Build
        continue-on-error: true # <--- 关键魔法：忽略报错，强行继续！
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DGGML_CUDA=ON -DGGML_CUDA_FA=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j 4

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-tq3-windows-cuda
          path: build/bin/Release/ # 把这个目录下成功生成的所有 exe 都打包
