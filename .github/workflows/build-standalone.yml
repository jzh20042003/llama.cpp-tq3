name: Build Standalone llama.cpp (RTX 4070 Ti Super)

on:
  workflow_dispatch:

jobs:
  build-windows-cuda:
    runs-on: windows-latest
    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 2. 安装 CUDA 12.4 编译环境 (已升级至最新版插件 v0.2.35)
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.4.1'

      - name: 3. 配置 CMake (关闭CURL彻底根除OpenSSL缺失问题)
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES=89 `
            -DLLAMA_CURL=OFF `
            -DCMAKE_BUILD_TYPE=Release

      - name: 4. 开始多核并行编译
        run: |
          cd build
          cmake --build . --config Release -j 4

      - name: 5. 自动打包所有必需的 DLL 和 EXE
        run: |
          mkdir release_package
          copy build\bin\Release\*.exe release_package\
          copy build\bin\Release\*.dll release_package\
          $cuda_bin = "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}\bin"
          copy "$cuda_bin\cudart64_12.dll" release_package\
          copy "$cuda_bin\cublas64_12.dll" release_package\
          copy "$cuda_bin\cublasLt64_12.dll" release_package\

      - name: 6. 上传最终绿色完整版
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-TQ3-MTP-RTX4070TiSuper-Standalone
          path: release_package\*
